<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anima Mundi</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5M8CP9SJHT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-5M8CP9SJHT');
</script>
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<canvas id="ambientCanvas"></canvas>

<!-- ══ SELECT SCREEN ══ -->
<div class="screen" id="sel">
  <div class="logo">
    <div class="logo-mandala">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(201,168,76,.2)" stroke-width=".5"/>
        <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(201,168,76,.35)" stroke-width=".5"/>
        <circle cx="32" cy="32" r="14" fill="none" stroke="rgba(201,168,76,.25)" stroke-width=".5"/>
        <g fill="none" stroke="rgba(201,168,76,.5)" stroke-width=".8">
          <line x1="32" y1="2" x2="32" y2="62"/>
          <line x1="2" y1="32" x2="62" y2="32"/>
          <line x1="9.5" y1="9.5" x2="54.5" y2="54.5"/>
          <line x1="54.5" y1="9.5" x2="9.5" y2="54.5"/>
        </g>
        <g fill="rgba(201,168,76,.7)">
          <polygon points="32,18 33.5,30.5 32,29 30.5,30.5" transform="rotate(0,32,32)"/>
          <polygon points="32,18 33.5,30.5 32,29 30.5,30.5" transform="rotate(60,32,32)"/>
          <polygon points="32,18 33.5,30.5 32,29 30.5,30.5" transform="rotate(120,32,32)"/>
          <polygon points="32,18 33.5,30.5 32,29 30.5,30.5" transform="rotate(180,32,32)"/>
          <polygon points="32,18 33.5,30.5 32,29 30.5,30.5" transform="rotate(240,32,32)"/>
          <polygon points="32,18 33.5,30.5 32,29 30.5,30.5" transform="rotate(300,32,32)"/>
        </g>
        <circle cx="32" cy="32" r="3" fill="rgba(201,168,76,.8)"/>
        <circle cx="32" cy="32" r="1.5" fill="rgba(232,212,136,.9)"/>
      </svg>
    </div>
    <div class="logo-t">Anima Mundi</div>
    <div class="logo-s">Six guides. One eternal wisdom.</div>
    <div class="logo-line"></div>
  </div>
  <div class="sec-label">Choose Your Sacred Guide</div>
  <div class="avatar-grid" id="avGrid"></div>
  <button class="enter-btn" id="enterBtn" disabled>Enter the Sanctuary</button>
</div>

<!-- ══ LORE PANEL ══ -->
<div id="lorePanel">
  <div class="lore-inner">
    <button class="lore-close" id="loreCloseBtn">✕</button>
    <div class="lore-portrait" id="lorePortrait"></div>
    <div class="lore-title" id="loreTitle"></div>
    <div class="lore-subtitle" id="loreSubtitle"></div>
    <div class="lore-tradition-badge" id="loreTradition"></div>
    <div class="lore-divider"></div>
    <div class="lore-origin" id="loreOriginLabel"></div>
    <div class="lore-story" id="loreStory"></div>
    <div class="lore-teachings">
      <div class="lore-teachings-title">Core Teachings</div>
      <div id="loreTeachingsList"></div>
    </div>
    <button class="lore-enter-btn" id="loreEnterBtn">Enter with this Guide</button>
  </div>
</div>

<!-- ══ COMPANION SCREEN ══ -->
<div class="screen hidden" id="comp">
  <div class="top-bar">
    <div class="tb-l">
      <div class="tb-mini-av" id="tbMini" title="View guide's story"></div>
      <div>
        <div class="tb-nm" id="tbNm">—</div>
        <div class="tb-sub" id="tbSub"></div>
      </div>
    </div>
    <!-- XP HUD -->
    <div id="xpHud">
      <div class="xp-level-icon">◌</div>
      <div class="xp-level-info">
        <div class="xp-level-title">Seeker</div>
        <div class="xp-bar-track"><div class="xp-bar-fill" style="width:0%"></div></div>
        <div style="display:flex;justify-content:space-between;gap:8px">
          <div class="xp-count">0 XP</div>
          <div class="xp-next"></div>
        </div>
      </div>
    </div>
    <div class="tb-r">
      <button class="ico-btn on" id="avTogBtn" title="Toggle avatar">◉</button>
      <button class="ico-btn" id="questBtn" title="Quests &amp; Progress">⚔</button>
      <button class="ico-btn" id="loreBtn" title="Guide's story">📖</button>
      <button class="ico-btn" id="backBtn" title="Change guide">⟵</button>
    </div>
  </div>

  <div class="av-stage" id="avStage">
    <div class="portrait-wrap">
      <div class="p-ring1"></div><div class="p-ring2"></div><div class="p-ring3"></div>
      <div class="portrait-bg" id="portraitBig"></div>
    </div>
    <div class="char-name-stage" id="stageCharName"></div>
    <div class="av-lbl">Present with you</div>
    <div class="stage-btn-row">
      <button class="stage-pill-btn" id="stageLoreBtn">✦ Sacred Origins</button>
      <button class="stage-pill-btn" id="stageQuizBtn">⚡ Wisdom Quiz</button>
    </div>
  </div>

  <div class="chat-scroll" id="chatScroll"></div>

  <div class="input-zone">
    <div class="qps" id="qpRow">
      <button class="qp" data-q="I carry grief I cannot name">I carry grief I cannot name</button>
      <button class="qp" data-q="Why do I suffer?">Why do I suffer?</button>
      <button class="qp" data-q="I seek inner stillness">I seek inner stillness</button>
      <button class="qp" data-q="What happens after death?">What happens after death?</button>
    </div>
    <div class="txt-row">
      <textarea id="uIn" placeholder="Type what is on your heart…" rows="1"></textarea>
      <button class="send-btn" id="sBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══ QUEST PANEL ══ -->
<div id="questPanel">
  <div class="quest-panel-inner">
    <div class="qp-header">
      <div class="qp-title">✦ Soul Journey</div>
      <button class="qp-close" id="questCloseBtn">✕</button>
    </div>

    <!-- Stats row -->
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-value" id="statMessages">0</div>
        <div class="stat-label">Messages</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statGuides">0/6</div>
        <div class="stat-label">Guides Met</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statDays">0</div>
        <div class="stat-label">Days Visited</div>
      </div>
    </div>

    <!-- XP progress -->
    <div class="xp-progress-block">
      <div class="xpb-top">
        <div class="xpb-level" id="qpLevelLabel">Level 1 — Seeker</div>
        <div class="xpb-next" id="qpNextLabel"></div>
      </div>
      <div class="xpb-bar"><div class="xpb-fill" id="qpXpFill" style="width:0%"></div></div>
      <div class="xpb-total" id="qpXpTotal">0 XP total</div>
    </div>

    <!-- Quiz trigger -->
    <button class="quiz-trigger-btn" id="questPanelQuizBtn">
      <span>⚡</span> Take a Wisdom Quiz
    </button>

    <!-- Quests list (injected by JS) -->
    <div id="questList"></div>
  </div>
</div>

<!-- ══ QUIZ MODAL ══ -->
<div id="quizModal">
  <div class="quiz-inner">
    <button class="quiz-close" id="quizCloseBtn">✕</button>
    <div class="quiz-tradition"></div>
    <div class="quiz-question"></div>
    <div class="quiz-answers"></div>
    <div class="quiz-result"></div>
    <div class="quiz-explanation"></div>
    <button class="quiz-next-btn">Continue</button>
  </div>
</div>

<!-- ══ LEVEL UP MODAL ══ -->
<div id="levelUpModal">
  <div class="lu-inner">
    <div class="lu-label">Soul Level Reached</div>
    <span class="lu-icon">✦</span>
    <div class="lu-title">Level 1</div>
    <div class="lu-subtitle">Seeker</div>
  </div>
</div>

<script type="module">
import { GUIDES } from './js/guides.js';
import { GamificationEngine, QUESTS, getLevelInfo } from './js/gamification.js';
import {
  initCanvas, buildSelectGrid, pickCard, showScreen,
  openLorePanel, closeLorePanel, setupCompanionScreen,
  addAIMessage, clearChat, updateXPHud, showXPToast,
  showLevelUp, showQuestComplete, toggleAvatarStage, autoResize
} from './js/ui.js';
import { sendMessage, resetHistory, showPrompts } from './js/chat.js';
import { openRandomQuiz, openGuideQuiz, closeQuiz } from './js/quiz.js';

// ─── State ─────────────────────────────────────────────
let curGuide = null;
let avShown = true;

// ─── Gamification engine ───────────────────────────────
const engine = new GamificationEngine(
  // Notification handler
  (type, data) => {
    if (type === 'xp') showXPToast(data.amount, data.reason);
    if (type === 'levelup') showLevelUp(data.level);
    if (type === 'quest') data.forEach(q => showQuestComplete(q));
  },
  // XP update handler
  (state) => {
    updateXPHud(state);
    updateQuestPanel(state);
  }
);

// Initial HUD
updateXPHud(engine.state);

// ─── Canvas ────────────────────────────────────────────
initCanvas();

// ─── Select screen ─────────────────────────────────────
buildSelectGrid(
  (id) => {
    curGuide = GUIDES.find(g => g.id === id);
    pickCard(id);
    document.getElementById('enterBtn').disabled = false;
  },
  (id) => openLore(id)
);

document.getElementById('enterBtn').addEventListener('click', enterSanctuary);

// ─── Lore panel ────────────────────────────────────────
function openLore(id) {
  openLorePanel(id, (guideId) => {
    const quests = engine.onLoreRead(guideId);
    if (quests.length) setTimeout(() => quests.forEach(q => showQuestComplete(q)), 300);
  });
}

document.getElementById('loreCloseBtn').addEventListener('click', closeLorePanel);
document.getElementById('lorePanel').addEventListener('click', (e) => {
  if (e.target === document.getElementById('lorePanel')) closeLorePanel();
});

// ─── Enter sanctuary ───────────────────────────────────
function enterSanctuary(guideId) {
  if (typeof guideId === 'string') {
    curGuide = GUIDES.find(g => g.id === guideId) || curGuide;
  }
  if (!curGuide) return;

  setupCompanionScreen(curGuide);
  showScreen('comp');
  clearChat();
  resetHistory();
  showPrompts();
  engine.onNewSession();

  addAIMessage(curGuide, curGuide.welcome);
  setTimeout(() => document.getElementById('uIn')?.focus(), 600);
}

// ─── Top bar buttons ───────────────────────────────────
document.getElementById('tbMini').addEventListener('click', () => openLore(curGuide?.id));
document.getElementById('loreBtn').addEventListener('click', () => openLore(curGuide?.id));
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('avTogBtn').addEventListener('click', () => {
  avShown = !avShown;
  toggleAvatarStage(avShown);
});

document.getElementById('questBtn').addEventListener('click', () => {
  updateQuestPanel(engine.state);
  document.getElementById('questPanel').classList.add('open');
});
document.getElementById('questCloseBtn').addEventListener('click', () => {
  document.getElementById('questPanel').classList.remove('open');
});

// Stage buttons
document.getElementById('stageLoreBtn').addEventListener('click', () => openLore(curGuide?.id));
document.getElementById('stageQuizBtn').addEventListener('click', () => triggerQuiz());

// Quest panel quiz button
document.getElementById('questPanelQuizBtn').addEventListener('click', triggerQuiz);

// Quiz close
document.getElementById('quizCloseBtn').addEventListener('click', closeQuiz);

function triggerQuiz() {
  openGuideQuiz(curGuide?.id, (score, total, quizId) => {
    const quests = engine.onQuizComplete(score, total, quizId);
    if (quests.length) setTimeout(() => quests.forEach(q => showQuestComplete(q)), 300);
  });
}

// ─── Chat ──────────────────────────────────────────────
document.getElementById('sBtn').addEventListener('click', doSend);
document.getElementById('uIn').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});
document.getElementById('uIn').addEventListener('input', (e) => autoResize(e.target));

document.querySelectorAll('.qp').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById('uIn');
    input.value = btn.dataset.q;
    autoResize(input);
    input.focus();
    document.getElementById('qpRow').style.display = 'none';
  });
});

async function doSend() {
  const input = document.getElementById('uIn');
  const text = input.value.trim();
  if (!text || !curGuide) return;
  input.value = '';
  autoResize(input);

  await sendMessage(curGuide, text, (sentText) => {
    const quests = engine.onMessage(curGuide.id, sentText);
    if (quests.length) setTimeout(() => quests.forEach(q => showQuestComplete(q)), 400);
  });
}

// ─── Go back ───────────────────────────────────────────
function goBack() {
  showScreen('sel');
  clearChat();
  resetHistory();
  showPrompts();
}

// ─── Quest panel rendering ─────────────────────────────
function updateQuestPanel(state) {
  const info = getLevelInfo(state.xp);
  const pct = Math.round(info.progress * 100);

  document.getElementById('qpLevelLabel').textContent =
    `Level ${info.current.level} — ${info.current.title}`;
  document.getElementById('qpNextLabel').textContent = info.next
    ? `${info.next.xpNeeded - state.xp} XP to ${info.next.title}`
    : 'Max Level Reached';
  document.getElementById('qpXpFill').style.width = pct + '%';
  document.getElementById('qpXpTotal').textContent = state.xp + ' XP total';

  const stats = engine.getStats();
  document.getElementById('statMessages').textContent = stats.totalMessages;
  document.getElementById('statGuides').textContent = stats.guidesSpokenTo + '/6';
  document.getElementById('statDays').textContent = stats.daysVisited;

  renderQuestList(engine.getQuestProgress());
}

function renderQuestList(quests) {
  const container = document.getElementById('questList');
  const categories = [
    { key: 'journey', label: '🗺 Journey' },
    { key: 'exploration', label: '🌐 Exploration' },
    { key: 'wisdom', label: '📿 Wisdom' },
    { key: 'lore', label: '📜 Sacred Lore' },
    { key: 'quiz', label: '⚡ Trials' },
  ];

  container.innerHTML = '';
  categories.forEach(cat => {
    const catQuests = quests.filter(q => q.category === cat.key);
    if (!catQuests.length) return;

    const title = document.createElement('div');
    title.className = 'quest-cat-title';
    title.textContent = cat.label;
    container.appendChild(title);

    catQuests.forEach(q => {
      const item = document.createElement('div');
      item.className = 'quest-item' + (q.completed ? ' done' : '');
      item.innerHTML = `
        <div class="quest-icon">${q.icon}</div>
        <div class="quest-info">
          <div class="quest-name">${q.title}</div>
          <div class="quest-desc">${q.desc}</div>
        </div>
        <div class="quest-xp">+${q.xp} XP</div>
        <div class="quest-check">${q.completed ? '✓' : ''}</div>`;
      container.appendChild(item);
    });
  });
}
</script>
</body>
</html>
